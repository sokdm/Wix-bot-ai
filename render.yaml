services:
  - type: web
    name: wix-whatsapp-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false  # Set in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: DEEPSEEK_API_KEY
        sync: false  # Set in Render dashboard
      - key: ADMIN_EMAIL
        value: admin@wixbot.com
      - key: ADMIN_PASSWORD
        generateValue: true
